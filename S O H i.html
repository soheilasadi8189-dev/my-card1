<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05060a;
    overflow:hidden;
    color:white;
}

.glow1{
    position:absolute;
    width:750px;
    height:750px;
    background:radial-gradient(circle,#7c3aed55,transparent 55%);
    filter:blur(85px);
    animation:float 6s ease-in-out infinite alternate;
}

.glow2{
    position:absolute;
    width:750px;
    height:750px;
    background:radial-gradient(circle,#1d4ed855,transparent 55%);
    filter:blur(85px);
    animation:float2 7s ease-in-out infinite alternate;
}

@keyframes float{
    from{transform:translate(-180px,-140px);}
    to{transform:translate(180px,140px);}
}

@keyframes float2{
    from{transform:translate(180px,140px);}
    to{transform:translate(-180px,-140px);}
}

.card{
    position:relative;
    width:360px;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(22px);
    text-align:center;
}

.avatar{
    width:95px;
    height:95px;
    border-radius:50%;
    border:2px solid #a78bfa;
    margin-bottom:12px;
    object-fit:cover;
}

h1{
    font-size:20px;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:6px;
}

.sub{
    font-size:12px;
    opacity:0.6;
    margin-bottom:12px;
}

a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:9px 0;
    padding:11px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-size:13px;
    border:1px solid rgba(255,255,255,0.1);
    transition:.25s;
}

a:hover{
    transform:translateY(-2px);
    border-color:#a78bfa66;
}

.phone{background:rgba(124,58,237,.4);}
.tg{background:rgba(29,78,216,.4);}
.ig{background:rgba(190,24,93,.4);}

#qrcode{
    margin-top:18px;
    display:flex;
    justify-content:center;
}

#qrcode img{
    width:115px;
    height:115px;
    border-radius:12px;
    background:#fff;
    padding:6px;
}

.footer{
    margin-top:12px;
    font-size:10px;
    opacity:.4;
    letter-spacing:3px;
}
</style>
</head>
