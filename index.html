<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soheil Asadi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05060a;
    overflow:hidden;
    color:white;
}

/* neon background */
.glow1{
    position:absolute;
    width:750px;
    height:750px;
    background:radial-gradient(circle,#7c3aed55,transparent 55%);
    filter:blur(85px);
    animation:float 6s ease-in-out infinite alternate;
}

.glow2{
    position:absolute;
    width:750px;
    height:750px;
    background:radial-gradient(circle,#1d4ed855,transparent 55%);
    filter:blur(85px);
    animation:float2 7s ease-in-out infinite alternate;
}

@keyframes float{
    from{transform:translate(-180px,-140px);}
    to{transform:translate(180px,140px);}
}

@keyframes float2{
    from{transform:translate(180px,140px);}
    to{transform:translate(-180px,-140px);}
}

.card{
    position:relative;
    width:360px;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(22px);
    text-align:center;
}

/* 👇 EASY CHANGE PROFILE IMAGE */
.avatar{
    width:95px;
    height:95px;
    border-radius:50%;
    border:2px solid #a78bfa;
    margin-bottom:12px;
    object-fit:cover;
}

/* name */
h1{
    font-size:20px;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:6px;
}

/* editable username style */
.sub{
    font-size:12px;
    opacity:0.6;
    margin-bottom:12px;
}

/* phone */
.phone-text{
    font-size:13px;
    opacity:0.8;
    margin-bottom:14px;
}

/* buttons */
a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:9px 0;
    padding:11px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-size:13px;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.25s;
}

a:hover{
    transform:translateY(-2px);
    border-color:#a78bfa66;
}

.phone{background:rgba(124,58,237,0.4);}
.tg{background:rgba(29,78,216,0.4);}
.ig{background:rgba(190,24,93,0.4);}

#qrcode{
    margin-top:16px;
    display:flex;
    justify-content:center;
}

.footer{
    margin-top:10px;
    font-size:10px;
    opacity:0.4;
    letter-spacing:3px;
}
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="card">

    <!-- 👇 فقط اینو عوض کن برای عکس -->
    <img class="avatar" src="https://s8.uupload.ir/files/img_3374_b8vu.jpeg">

    <h1>SOHEIL ASADI</h1>

    <!-- 👇 username line -->
    <div class="sub">ُS O H i</div>

    <a class="phone" href="tel:+989395392610">📞 CALL</a>

    <!-- INSTAGRAM -->
    <a class="ig" href="https://instagram.com/soheilasadi65" target="_blank">
        📷 INSTAGRAM
    </a>

    <!-- TELEGRAM -->
    <a class="tg" href="https://t.me/Hashem_Khoshchehre" target="_blank">
        ✈ TELEGRAM
    </a>

    <div id="qrcode"></div>

    <div class="footer">PREMIUM DIGITAL CARD</div>

</div>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 115,
    height: 115,
    colorDark: "#e0e7ff",
    colorLight: "transparent",
    correctLevel: QRCode.CorrectLevel.H
});
</script>

</body>
</html>
